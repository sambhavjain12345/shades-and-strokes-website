version: '3.9'

services:

  # ── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: ss_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${DB_NAME:-shades_strokes}
      MYSQL_USER:          ${DB_USER:-ssuser}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-rootpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - ss_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js / Express API ───────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ss_api
    restart: unless-stopped
    environment:
      NODE_ENV:       production
      PORT:           5000
      DB_HOST:        db
      DB_PORT:        3306
      DB_USER:        ${DB_USER:-ssuser}
      DB_PASSWORD:    ${DB_PASSWORD:-rootpassword}
      DB_NAME:        ${DB_NAME:-shades_strokes}
      JWT_SECRET:     ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL:     http://localhost:80
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ss_network

  # ── Nginx (serves static frontend + proxies API) ────────────
  nginx:
    image: nginx:alpine
    container_name: ss_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - ss_network

volumes:
  mysql_data:
  uploads:

networks:
  ss_network:
    driver: bridge
